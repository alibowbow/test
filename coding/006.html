<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>간병인서류.pdf 다운로드</title>
<meta name="description" content="간병인서류.pdf 파일을 원하는 이름·위치로 저장할 수 있는 다운로드 페이지."/>
<style>
:root{
  --bg:#100c0b; --panel:#1a1413; --panel-2:#221a18; --line:#382a26;
  --txt:#f1eae6; --muted:#b3a29a; --red:#e23b3b; --red-deep:#b91c1c; --gold:#f0a830;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  background:radial-gradient(1000px 560px at 50% -8%, #2a1614 0%, var(--bg) 55%) no-repeat, var(--bg);
  color:var(--txt);padding:24px;line-height:1.7}
.card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);border-radius:22px;
  padding:34px 28px 30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.doc{width:96px;height:96px;margin:0 auto 20px;border-radius:20px;display:grid;place-items:center;
  background:radial-gradient(circle at 30% 25%,#3a201c,#160f0e);border:1px solid var(--line);
  font-size:44px;box-shadow:inset 0 0 16px rgba(240,168,48,.12)}
h1{font-size:1.5rem;margin:0 0 4px;color:#fff;letter-spacing:-.01em}
.fname{font-family:ui-monospace,Consolas,monospace;color:var(--gold);font-size:1.02rem;word-break:break-all}
.desc{color:var(--muted);font-size:.9rem;margin:10px 0 24px}
.dl-btn{display:inline-flex;align-items:center;gap:10px;text-decoration:none;font-weight:700;font-size:1.05rem;
  color:#fff;padding:15px 30px;border-radius:14px;
  background:linear-gradient(90deg,var(--red),var(--red-deep));
  box-shadow:0 10px 26px rgba(226,59,59,.35);transition:transform .15s,box-shadow .15s}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(226,59,59,.45)}
.dl-btn:active{transform:translateY(0)}
.hint{margin-top:16px;font-size:.78rem;color:var(--muted)}
footer{margin-top:26px;font-size:.72rem;color:var(--muted);opacity:.7;letter-spacing:.02em}
</style>
</head>
<body>
  <div class="card">
    <div class="doc">📄</div>
    <h1>파일 다운로드</h1>
    <div class="fname">간병인서류.pdf</div>
    <p class="desc">아래 버튼을 누르면 파일을 내려받습니다.<br>저장 창에서 <b>원하는 이름·위치</b>로 저장하세요.</p>
    <a class="dl-btn" href="간병인서류.pdf" download="간병인서류.pdf">
      <span>⬇</span> 다운로드 (다른 이름으로 저장)
    </a>
    <div class="hint">버튼이 눌리지 않으면 링크를 우클릭 → <b>“다른 이름으로 링크 저장…”</b></div>
  </div>
  <footer>coding / 006</footer>
</body>
</html>
